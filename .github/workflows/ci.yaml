name: CI pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Build docker image
        run: docker build -t food-delivery-app .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: |
          docker tag food-delivery-app ${{ secrets.DOCKER_USERNAME }}/food-delivery-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/food-delivery-app:latest
      # 🔐 Setup SSH key (IMPORTANT FIX)
      # 🔐 Setup SSH key + config
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile=/dev/null" > ~/.ssh/config

# 🚀 Deploy using raw ssh
      - name: Deploy to VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} << 'EOF'
          docker stop app || true
          docker rm app || true

          docker image prune -af

          docker pull ${{ secrets.DOCKER_USERNAME }}/food-delivery-app:latest

          docker run -d -p 80:3000 --name app ${{ secrets.DOCKER_USERNAME }}/food-delivery-app:latest
          EOF