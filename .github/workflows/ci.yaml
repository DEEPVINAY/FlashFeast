name: CI pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Build docker image
        run: docker build -t food-delivery-app .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: |
          docker tag food-delivery-app ${{ secrets.DOCKER_USERNAME }}/food-delivery-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/food-delivery-app:latest
      # 🔐 Setup SSH key (IMPORTANT FIX)
      - name: Setup SSH key
        run: | 
          printf "%s" "${{ secrets.SSH_KEY }}" > key.pem
          chmod 600 key.pem

      # 🚀 DEPLOY
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key_path: key.pem
          script: |
            docker stop app || true
            docker rm app || true

            docker image prune -af

            docker pull ${{ secrets.DOCKER_USERNAME }}/food-delivery-app:latest

            docker run -d -p 80:3000 --name app ${{ secrets.DOCKER_USERNAME }}/food-delivery-app:latest